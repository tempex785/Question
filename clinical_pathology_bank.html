<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Pathology Final</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2333;
    --border: #2a3050;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --gold: #f39c12;
    --text: #e8eaf0;
    --muted: #8892a4;
    --answer-bg: #0d1f1a;
    --answer-border: #1a6b4a;
    --answer-text: #4ecca3;
    --tag-bg: #1a1f35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a0a0a 0%, #2d0f0f 50%, #1a0a0a 100%);
    border-bottom: 2px solid var(--accent);
    padding: 24px 20px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(192,57,43,0.3);
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
  }

  header h1 span {
    color: var(--accent2);
  }

  header p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* FILTER TABS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 16px 8px;
    justify-content: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 88px;
    z-index: 99;
  }

  .filter-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 16px;
    padding: 10px 16px;
    justify-content: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .stat span {
    color: var(--gold);
    font-weight: 700;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 16px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { background: var(--border); }
  .ctrl-btn.green { border-color: #1a6b4a; color: #4ecca3; }
  .ctrl-btn.green:hover { background: #0d1f1a; }

  /* LECTURE SECTION */
  .lecture-section {
    padding: 0 12px 8px;
  }

  .lecture-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 8px 8px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .lecture-label::before {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .lecture-label .lec-tag {
    background: var(--accent);
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 700;
  }

  /* Q&A CARD */
  .qa-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .qa-card.revealed {
    border-color: var(--answer-border);
  }

  .qa-card.important {
    border-color: #6b4a00;
  }

  .question-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 14px 12px;
    cursor: pointer;
    user-select: none;
  }

  .q-num {
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 900;
    padding: 3px 8px;
    border-radius: 8px;
    min-width: 36px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .qa-card.important .q-num {
    background: var(--gold);
    color: #1a0a00;
  }

  .q-text {
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.6;
    flex: 1;
  }

  .toggle-icon {
    color: var(--muted);
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.25s;
  }

  .qa-card.revealed .toggle-icon {
    transform: rotate(180deg);
    color: var(--answer-text);
  }

  /* ANSWER */
  .answer-box {
    display: none;
    padding: 14px 14px 14px 42px;
    background: var(--answer-bg);
    border-top: 1px solid var(--answer-border);
  }

  .qa-card.revealed .answer-box {
    display: block;
  }

  .answer-box ul {
    list-style: none;
    padding: 0;
  }

  .answer-box ul li {
    position: relative;
    padding-right: 16px;
    margin-bottom: 6px;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--answer-text);
  }

  .answer-box ul li::before {
    content: '←';
    position: absolute;
    right: 0;
    color: var(--answer-border);
    font-size: 0.8rem;
  }

  .answer-box p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--answer-text);
  }

  .answer-box .sub-label {
    color: var(--gold);
    font-weight: 700;
    font-size: 0.8rem;
    margin: 8px 0 4px;
    display: block;
  }

  .answer-box .note {
    background: #1a1400;
    border: 1px solid #6b4a00;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.8rem;
    color: #f0c040;
    margin-top: 8px;
  }

  /* IMPORTANT MCQ SECTION */
  .mcq-block {
    background: #1a1400;
    border: 1px solid #6b4a00;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .mcq-header {
    padding: 12px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .mcq-header .star { font-size: 1rem; }

  .mcq-body {
    display: none;
    padding: 2px 14px 14px;
  }

  .mcq-block.open .mcq-body { display: block; }
  .mcq-block.open .mcq-toggle { transform: rotate(180deg); }

  .mcq-toggle {
    margin-right: auto;
    color: var(--gold);
    transition: transform 0.2s;
  }

  .mcq-item {
    margin-bottom: 10px;
  }

  .mcq-item .mcq-title {
    color: var(--gold);
    font-weight: 700;
    font-size: 0.82rem;
    margin-bottom: 4px;
  }

  .mcq-item p, .mcq-item li {
    font-size: 0.85rem;
    color: #e8c060;
    line-height: 1.65;
  }

  .mcq-item ul { list-style: none; padding: 0; }
  .mcq-item ul li::before { content: '• '; color: var(--gold); }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    display: none;
  }

  /* SCROLL TOP */
  #scrollTop {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 1.2rem;
    cursor: pointer;
    display: none;
    z-index: 200;
    box-shadow: 0 4px 12px rgba(192,57,43,0.5);
  }

  .main-content {
    padding-bottom: 60px;
  }
</style>
</head>

let currentFilter = 'all';
let revealedSet = new Set();

function buildCards() {
  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  let totalVisible = 0;

  const lecKeys = currentFilter === 'all' ? Object.keys(data) : [currentFilter];

  lecKeys.forEach(lec => {
    const section = data[lec];
    const secDiv = document.createElement('div');
    secDiv.className = 'lecture-section';
    secDiv.dataset.lec = lec;

    // Lecture label
    const label = document.createElement('div');
    label.className = 'lecture-label';
    label.innerHTML = `<span class="lec-tag">${lec}</span>${section.title.replace(/L\d+ — /, '')}`;
    secDiv.appendChild(label);

    // Questions
    section.questions.forEach((item, idx) => {
      const id = `${lec}_${idx}`;
      totalVisible++;
      const card = document.createElement('div');
      card.className = 'qa-card' + (item.important ? ' important' : '') + (revealedSet.has(id) ? ' revealed' : '');
      card.dataset.id = id;
      card.innerHTML = `
        <div class="question-row" onclick="toggleCard('${id}', this.closest('.qa-card'))">
          <div class="q-num">Q${idx+1}</div>
          <div class="q-text">${item.q}</div>
          <div class="toggle-icon">▼</div>
        </div>
        <div class="answer-box">
          <ul>${item.a.map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
      `;
      secDiv.appendChild(card);
    });

    // MCQ block
    if (section.mcq && section.mcq.length) {
      const mcqDiv = document.createElement('div');
      mcqDiv.className = 'mcq-block';
      mcqDiv.innerHTML = `
        <div class="mcq-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="star">⭐</span> IMPORTANT MCQ & OSPE — ${section.title.replace(/L\d+ — /, '')}
          <span class="mcq-toggle">▼</span>
        </div>
        <div class="mcq-body">
          ${section.mcq.map(m => `
            <div class="mcq-item">
              <div class="mcq-title">📌 ${m.title}</div>
              <ul>${m.points.map(p => `<li>${p}</li>`).join('')}</ul>
            </div>
          `).join('')}
        </div>
      `;
      secDiv.appendChild(mcqDiv);
    }

    container.appendChild(secDiv);
  });

  document.getElementById('visibleCount').textContent = totalVisible;
  updateRevealedCount();

  const noRes = document.getElementById('noResults');
  noRes.style.display = totalVisible === 0 ? 'block' : 'none';
}

function toggleCard(id, card) {
  card.classList.toggle('revealed');
  if (card.classList.contains('revealed')) {
    revealedSet.add(id);
  } else {
    revealedSet.delete(id);
  }
  updateRevealedCount();
}

function updateRevealedCount() {
  document.getElementById('revealedCount').textContent = revealedSet.size;
}

function filterLec(lec, btn) {
  currentFilter = lec;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCards();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function revealAll() {
  document.querySelectorAll('.qa-card').forEach(card => {
    card.classList.add('revealed');
    revealedSet.add(card.dataset.id);
  });
  updateRevealedCount();
}

function hideAll() {
  document.querySelectorAll('.qa-card').forEach(card => {
    card.classList.remove('revealed');
  });
  revealedSet.clear();
  updateRevealedCount();
}

function shuffleCards() {
  // Shuffle questions within each lecture section
  const lecKeys = currentFilter === 'all' ? Object.keys(data) : [currentFilter];
  lecKeys.forEach(lec => {
    const arr = data[lec].questions;
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  });
  revealedSet.clear();
  buildCards();
}

// Scroll to top button
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').style.display = window.scrollY > 300 ? 'block' : 'none';
});

buildCards();
</script>
